
<!DOCTYPE html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>TacBook CS2</title>
    <link rel="manifest" href="/manifest.json" />
    <!-- Apple Touch Icon is crucial for iOS "Add to Home Screen" visual -->
    <link rel="apple-touch-icon" href="https://api.iconify.design/mdi:strategy.svg?color=%233b82f6" />
    <meta name="description" content="CS2 全地图战术手册" />
    <style>
      /* Custom Scrollbar Styles */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.2);
        background-clip: content-box;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
        background-clip: content-box;
      }

      /* Custom Flowing Gradient Animation */
      @keyframes flowGradient {
          0% { background-position: 0% 50%; }
          100% { background-position: 200% 50%; }
      }

      /* Custom Flowing Gradient Classes - Epic Purple/Pink Theme */
      .text-flow-pink {
          /* Fuchsia-600 -> Pink-400 -> Fuchsia-600 loop. Distinct from Red. Slow 8s animation. */
          background: linear-gradient(90deg, #c026d3 0%, #f472b6 50%, #c026d3 100%); 
          background-size: 200% auto;
          color: transparent;
          -webkit-text-fill-color: transparent;
          -webkit-background-clip: text;
          background-clip: text;
          animation: flowGradient 8s linear infinite;
      }
      
      .bg-flow-pink {
          background: linear-gradient(90deg, #c026d3 0%, #f472b6 50%, #c026d3 100%);
          background-size: 200% auto;
          animation: flowGradient 8s linear infinite;
      }
    </style>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW failed', err));
    });
  }
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
